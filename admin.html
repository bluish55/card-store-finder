<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>관리자 페이지</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-form">
    <h2>관리자 로그인</h2>
    <input type="email" id="email" placeholder="이메일">
    <input type="password" id="password" placeholder="비밀번호">
    <button onclick="login()">로그인</button>
  </div>

  <button id="menu-btn" class="hidden" onclick="openMenu()">&#9776;</button>

  <div id="menu-overlay" class="hidden" onclick="closeMenu()"></div>
  <div id="side-menu" class="hidden">
    <p id="menu-email"></p>
    <button onclick="logout()">로그아웃</button>
  </div>

  <div id="admin-panel" class="hidden">
    <h2>판매점 관리</h2>

    <h3>판매점 추가</h3>
    <input type="text" id="name" placeholder="상호명">
    <input type="text" id="address" placeholder="주소">
    <input type="number" id="lat" placeholder="위도 (주소 못찾을 때 직접 입력)" step="any">
    <input type="number" id="lng" placeholder="경도 (주소 못찾을 때 직접 입력)" step="any">
    <input type="text" id="phone" placeholder="전화번호">
    <input type="text" id="items" placeholder="취급품목">
    <select id="type">
      <option value="자판기">자판기</option>
      <option value="편의점">편의점</option>
      <option value="문방구">문방구</option>
      <option value="카드샵">카드샵</option>
    </select>
    <button onclick="addStore()">추가</button>

    <h3>CSV 일괄 업로드</h3>
    <p style="font-size:13px;color:#666;">CSV 형식: name, address, phone, items, type (첫 줄은 헤더)</p>
    <input type="file" id="csv-file" accept=".csv">
    <button onclick="uploadCSV()">업로드</button>
    <div id="upload-status"></div>

    <h3>판매처 제보</h3>
    <div id="pending-list"></div>
    <div id="pending-pagination">
      <button id="pending-prev-btn" onclick="changePendingPage(-1)">이전</button>
      <span id="pending-page-info"></span>
      <button id="pending-next-btn" onclick="changePendingPage(1)">다음</button>
    </div>

    <h3>판매점 목록</h3>
    <div id="list-controls" style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
      <select id="sort-select">
        <option value="created">등록순</option>
        <option value="name">이름순</option>
        <option value="type">종류순</option>
      </select>
    </div>
    <div id="list-filter">
      <button class="list-filter-btn active" data-type="all">전체</button>
      <button class="list-filter-btn" data-type="자판기">자판기</button>
      <button class="list-filter-btn" data-type="편의점">편의점</button>
      <button class="list-filter-btn" data-type="문방구">문방구</button>
      <button class="list-filter-btn" data-type="카드샵">카드샵</button>
      <button class="list-filter-btn" data-type="중복">중복</button>
    </div>
    <div id="store-list"></div>
    <div id="pagination">
      <button id="prev-btn" onclick="changePage(-1)">이전</button>
      <span id="page-info"></span>
      <button id="next-btn" onclick="changePage(1)">다음</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
