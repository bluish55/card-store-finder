<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓몬카드 판매점 지도</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="filter-bar">
    <button class="filter-btn active" data-type="all">전체</button>
    <button class="filter-btn" data-type="자판기">자판기</button>
    <button class="filter-btn" data-type="편의점">편의점</button>
    <button class="filter-btn" data-type="문방구">문방구</button>
  </div>

  <button id="menu-btn">☰</button>
  <div id="menu-overlay" class="hidden"></div>
  <div id="side-menu" class="hidden">
    <div id="location-menu-item">
      <span>내 위치 사용</span>
      <label class="toggle-switch">
        <input type="checkbox" id="location-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div id="location-popup" class="hidden">
    <div id="location-popup-box">
      <p>내 주변 판매점을 찾으려면<br>위치 권한이 필요합니다</p>
      <button id="popup-allow-btn">위치 허용하기</button>
      <button id="popup-skip-btn" class="btn-secondary">위치 사용 안 함</button>
    </div>
  </div>

  <div id="location-denied-banner" class="hidden">
    <span>위치 권한이 차단됐습니다. 브라우저 설정에서 허용해주세요.</span>
    <button onclick="this.parentElement.classList.add('hidden')">✕</button>
  </div>

  <div id="store-panel" class="hidden">
    <div id="panel-handle"></div>
    <h2 id="store-name"></h2>
    <p id="store-type"></p>
    <p id="store-address"></p>
    <p id="store-phone"></p>
    <p id="store-items"></p>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cf6b8c5a31ab27835ad75b58e202f3ea&libraries=services"></script>
  <script src="map.js"></script>
</body>
</html>
